# Sourcing config files
$configs = $HOME/.config/hypr/configs
$scripts = $HOME/.config/hypr/scripts

source = $configs/keybinds.conf


# Monitors
monitor=eDP-1,1920x1080@60,0x0,1.0
monitor=HDMI-A-2,1920x1080@60,0x0,1.0

# Environments
env = GTK_THEME,catppuccin-mocha-blue-standard+default

# setup XDG
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

env = HYPRSHOT_DIR, /home/vinzk/screenshots

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/xdg-portal-hyprland.sh

# Execute apps at launch
exec-once = ~/.scripts/startup.sh

exec-once = brightnessctl set 50%


# Some default env vars.
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,28
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0.5 # -1.0 to 1.0, 0 means no modification.
    accel_profile = flat
    scroll_factor = 1.0

    touchpad {
        natural_scroll = yes
	      scroll_factor = 0.4
    }
}

device {
    name = tpps/2-elan-trackpoint
    sensitivity = 0.7
  }

general {
    gaps_in = 1
    gaps_out = 1
    layout = scrolling
    border_size = 1
    col.active_border = rgb(a5bfc9)
    allow_tearing = false
}

decoration {
    rounding = 1

    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

animations {
    enabled = yes

    animation = layersIn, 1, 1, default, slide right
    animation = layersOut, 1, 1, default, slide right
    animation = windowsIn, 1, 2, default
    animation = windowsOut, 1, 4, default, popin 80%
    animation = windowsMove, 1, 4, default 
    animation = border, 0, 10, default
    animation = borderangle, 0, 8, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 2, default
    animation = specialWorkspace, 0, 1, default, fade
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # new_is_master = true
}

gestures {
    workspace_swipe_cancel_ratio = 0.0
    workspace_swipe_invert = false
    workspace_swipe_touch = true
}

cursor {
    hide_on_key_press = true
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_splash_rendering = true
    vfr=true
}

# tofi launcher
layerrule = animation popin, match:namespace launcher
layerrule = animation popin, match:namespace rofi
layerrule = animation noanim, match:namespace hyprpicker




device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

workspace = 1, layoutopt:direction:right

# Window Rules
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
workspace = 10, monitor:HDMI-A-2, default:true

## Smart gaps
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# windowrule = suppress_event maximize, class:.* 
windowrule = border_size 1, match:float 1    

windowrule = workspace 10 silent,match:class steam
windowrule = workspace 11 silent,match:class thunderbird

windowrule = float on, match:class feh
windowrule = float on, match:class mpv
windowrule = float on, match:class waypaper
#windowrule = float on, size 1000 1000, class:(thunar)
windowrule = float on, size 1920 1000, match:class pavucontrol
# windowrule = float on, class:(firefox)
windowrule = float on, match:class org.pwmt.zathura
